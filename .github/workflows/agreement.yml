name: agreement
on:
  push:
    branches: [ "main" ]

jobs:
    membership_while_shallow:
      runs-on: ubuntu-latest
      steps:
        - name: Checkout
          uses: actions/checkout@v4
  
        - name: Install Node.js
          uses: actions/setup-node@v3
          with:
            node-version: 20
            
        - name: membership_while_shallow
          run: |
            npm install
            timeout 334m node agreement.js
  
